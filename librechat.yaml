# LibreChat Configuration for sciChat/scisyChat (LSS fork)
version: 1.3.13

cache: false

# App metadata
app:
  title: "sciChat"

# Allow email + password login (LSS fork patches handle the rest)
registration:
  allowedDomains: []

# Limits
limits:
  max_file_size_mb: 50

# Default behavior
interface:
  privacyPolicy:
    externalUrl: ""
  termsOfService:
    externalUrl: ""

# File strategy: local storage
fileStrategy: "local"

# No whitelist — all auth handled by LSS fork patches
